name: Works on my car / Працуе на маёй машыне
description: Report successful compatibility
title: "[works-on]: "
labels: ["compatibility"]
body:
  - type: input
    id: vehicle
    attributes:
      label: Vehicle model
    validations:
      required: true
  - type: input
    id: dilink
    attributes:
      label: DiLink / getprop
  - type: checkboxes
    id: displays
    attributes:
      label: What works
      options:
        - label: Instrument cluster HUD
        - label: Drive panel (center)
        - label: Left / right / straight arrows
        - label: Street name on HUD
