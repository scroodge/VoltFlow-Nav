name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - run: chmod +x gradlew
      - name: Assemble release APK
        run: ./gradlew assembleRelease --no-daemon
      - name: Copy release APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/VoltFlowNav-v*.apk dist/VoltFlowNav-${{ github.ref_name }}.apk
      - name: Extract changelog for release body
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > dist/release-notes.md
          if [ ! -s dist/release-notes.md ]; then
            echo "No CHANGELOG section for ${VERSION}; using template." >&2
            echo "## VoltFlow Nav ${GITHUB_REF_NAME}" > dist/release-notes.md
          fi
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/VoltFlowNav-*.apk
          generate_release_notes: false
          body_path: dist/release-notes.md
